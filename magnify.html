<style>
    canvas {
        display: block;
        border-radius: var(--border-radius-md);
    }
    .row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 8px 0 0;
        font-size: 13px;
        color: var(--color-text-secondary);
        flex-wrap: wrap;
    }
    .row label {
        min-width: 90px;
    }
    .row input[type="range"] {
        flex: 1;
        min-width: 100px;
    }
    .row span {
        min-width: 38px;
        text-align: right;
        font-family: var(--font-mono);
        font-size: 12px;
    }
    .mode-btn {
        padding: 4px 12px;
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        cursor: pointer;
        font-size: 12px;
    }
    .mode-btn.active {
        background: var(--color-text-primary);
        color: var(--color-background-primary);
    }
</style>

<canvas id="cv"></canvas>
<div class="row">
    <label>Radius</label>
    <input type="range" id="rad" min="30" max="180" value="100" />
    <span id="radV">100</span>
</div>
<div class="row">
    <label>Magnification</label>
    <input type="range" id="mag" min="101" max="300" value="160" />
    <span id="magV">1.60×</span>
</div>
<div class="row">
    <label>Mode</label>
    <button class="mode-btn active" id="btnL1" onclick="setMode('l1')">
        L¹ diagonal warp
    </button>
    <button class="mode-btn" id="btnSnell" onclick="setMode('snell')">
        Snell hemisphere
    </button>
    <button class="mode-btn" id="btnFlat" onclick="setMode('flat')">
        Flat zoom
    </button>
    <button class="mode-btn" id="loadBtn">Load Image</button>
    <button class="mode-btn" id="pathBtn">Where's Waldo</button>
</div>

<script>
    const cv = document.getElementById("cv");
    const ctx = cv.getContext("2d");

    let W, H;
    let mode = "l1";
    let mouse = { x: 0, y: 0 };
    let radius = 100,
        mag = 1.6;
    let animId;
    let lastImg = null; // keep reference to last loaded image for resize redraws

    // ── render loop ───────────────────────────────────────────────────────────────
    let lastMode = "",
        lastRad = 0,
        lastMag = 0,
        lastMx = -1,
        lastMy = -1;

    const offscreen = document.createElement("canvas");
    const offCtx = offscreen.getContext("2d");

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    // ── resize ────────────────────────────────────────────────────────────────────
    function resize() {
        W = cv.parentElement.offsetWidth || window.innerWidth;
        H = Math.round(W * 0.56);
        cv.width = W;
        cv.height = H;
        offscreen.width = W;
        offscreen.height = H;
        mouse.x = W / 2;
        mouse.y = H / 2;
        drawScene(offscreen, lastImg); // redraw at new size, preserving last image
        lastMx = -1; // force re-render
    }

    // debounce resize so it doesn't thrash during drag
    let resizeTimer;
    window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resize, 120);
    });

    // initial size
    resize();

    // ── controls ──────────────────────────────────────────────────────────────────
    function setMode(m) {
        mode = m;
        ["btnL1", "btnSnell", "btnFlat"].forEach((id) =>
            document.getElementById(id).classList.remove("active"),
        );
        document
            .getElementById(
                m === "l1" ? "btnL1" : m === "snell" ? "btnSnell" : "btnFlat",
            )
            .classList.add("active");
    }

    document.getElementById("rad").oninput = (e) => {
        radius = +e.target.value;
        document.getElementById("radV").textContent = radius;
    };
    document.getElementById("mag").oninput = (e) => {
        mag = e.target.value / 100;
        document.getElementById("magV").textContent = mag.toFixed(2) + "×";
    };

    cv.onmousemove = (e) => {
        const r = cv.getBoundingClientRect();
        mouse.x = (e.clientX - r.left) * (W / r.width);
        mouse.y = (e.clientY - r.top) * (H / r.height);
    };
    cv.ontouchmove = (e) => {
        e.preventDefault();
        const r = cv.getBoundingClientRect();
        const t = e.touches[0];
        mouse.x = (t.clientX - r.left) * (W / r.width);
        mouse.y = (t.clientY - r.top) * (H / r.height);
    };

    // ── drawScene ─────────────────────────────────────────────────────────────────
    function drawScene(c, img = null) {
        const w = c.width,
            h = c.height;
        const g = c.getContext("2d");
        g.fillStyle = "#1a1a2e";
        g.fillRect(0, 0, w, h);
        const cols = 12,
            rows = 8;
        for (let r = 0; r < rows; r++) {
            for (let cc = 0; cc < cols; cc++) {
                const hue = ((cc / cols) * 360 + r * 25) % 360;
                g.fillStyle = `hsl(${hue},65%,${35 + r * 4}%)`;
                g.fillRect(
                    cc * (w / cols) + 1,
                    r * (h / rows) + 1,
                    w / cols - 2,
                    h / rows - 2,
                );
            }
        }

        if (img) {
            const scale = Math.min(w / img.width, h / img.height);
            const iw = img.width * scale;
            const ih = img.height * scale;
            g.drawImage(img, (w - iw) / 2, (h - ih) / 2, iw, ih);
        } else {
            g.fillStyle = "rgba(255,255,255,0.9)";
            g.font = `bold ${Math.round(w / 22)}px sans-serif`;
            g.textAlign = "center";
            g.fillText("Move mouse · Load an image", w / 2, h / 2);
            g.textAlign = "left";
        }
    }

    // ── image loading ─────────────────────────────────────────────────────────────
    function loadImg(img) {
        lastImg = img; // save for resize redraws
        drawScene(offscreen, img);
        lastMx = -1;
    }

    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        input.value = "";
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            loadImg(img);
            URL.revokeObjectURL(url);
        };
        img.onerror = () => URL.revokeObjectURL(url);
        img.src = url;
    };
    document.getElementById("loadBtn").onclick = () => input.click();

    cv.addEventListener("dragover", (e) => e.preventDefault());
    cv.addEventListener("drop", (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file?.type.startsWith("image/")) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            loadImg(img);
            URL.revokeObjectURL(url);
        };
        img.onerror = () => URL.revokeObjectURL(url);
        img.src = url;
    });

    function loadFromPath(path) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => loadImg(img);
        img.onerror = () =>
            console.warn(
                "Could not load image from:",
                path,
                "— if using file://, run a local HTTP server instead.",
            );
        img.src = path;
    }
    document.getElementById("pathBtn").onclick = () =>
        loadFromPath("./whereswaldo.jpg");

    // ── lens ──────────────────────────────────────────────────────────────────────
    function applyLens(imgData, mx, my, rad, magFactor, lensMode) {
        const src = new Uint8ClampedArray(imgData.data);
        const dst = imgData.data;
        const w = imgData.width,
            h = imgData.height;
        const r2 = rad * rad;
        const invMag = 1 / magFactor;

        for (let py = 0; py < h; py++) {
            for (let px = 0; px < w; px++) {
                const dx = px - mx,
                    dy = py - my;
                const distsqrd = dx * dx + dy * dy;
                if (distsqrd >= r2) continue;

                let sx, sy;
                const dist = Math.sqrt(distsqrd);
                const normDist = dist / rad; // 0 at centre, 1 at edge

                if (lensMode === "flat") {
                    const scale = invMag;
                    sx = mx + dx * scale;
                    sy = my + dy * scale;
                } else if (lensMode === "snell") {
                    const IOR = magFactor * 1.1;
                    const mu = 1 / IOR;
                    const z = Math.sqrt(r2 - distsqrd);
                    // len = RADIUS exactly, but compute explicitly for clarity
                    const len = Math.sqrt(dx * dx + dy * dy + z * z); // = RADIUS

                    const nx = -dx / len,
                        ny = -dy / len,
                        nz = z / len;
                    const c = -nz;
                    const disc = 1 - mu * mu * (1 - c * c);

                    if (disc < 0) {
                        sx = px;
                        sy = py; // total internal reflection
                    } else {
                        const sq = Math.sqrt(disc);
                        const trx = (sq - mu * c) * nx; // incident ray is (0,0,-1)
                        const try_ = (sq - mu * c) * ny; // so mu*i terms vanish in x,y
                        const trz = -mu + (sq - mu * c) * nz;

                        // t in normalised space, scaled back to pixels
                        const t = (-nz / trz) * len; // or just: -z / (trz * ... )
                        // cleaner: keep everything in pixel space from the start
                        const tPix = -z / trz; // trz is dimensionless (unit vector)
                        sx = px + trx * tPix * 0.1;
                        sy = py + try_ * tPix * 0.1;
                    }
                } else {
                    // decompose offset into radial and tangential parts
                    const dist = Math.sqrt(distsqrd);
                    const normDist = dist / radius;
                    const IOR = magFactor * 1.1;
                    const mu = (1.1 / magFactor) * IOR;
                    // unit radial direction
                    const rx = dx / dist,
                        ry = dy / dist;

                    // unit tangential direction (perpendicular)
                    const tx_ = -ry,
                        ty_ = rx;

                    // project offset onto radial and tangential
                    const radialMag = dx * rx + dy * ry; // = dist
                    const tanMag = dx * tx_ + dy * ty_; // = 0 for pure radial offset, varies at edge

                    // warp radial and tangential independently
                    // radial: compress toward centre (magnify)
                    const radialWarp = Math.pow(normDist, mu) * radius;
                    // tangential: stretch along circumference — grows toward edge
                    // this is the missing piece: tangential warp increases with normDist
                    const tanWarp =
                        tanMag * (1.0 + (1.0 - mu) * normDist * normDist);

                    // reconstruct
                    sx = mx + rx * radialWarp + tx_ * tanWarp;
                    sy = my + ry * radialWarp + ty_ * tanWarp;
                }

                const fx = Math.max(0, Math.min(w - 1.001, sx));
                const fy = Math.max(0, Math.min(h - 1.001, sy));
                const x0 = fx | 0,
                    y0 = fy | 0;
                const x1 = Math.min(x0 + 1, w - 1),
                    y1 = Math.min(y0 + 1, h - 1);
                const ftx = fx - x0,
                    fty = fy - y0;
                const i00 = (y0 * w + x0) * 4,
                    i10 = (y0 * w + x1) * 4;
                const i01 = (y1 * w + x0) * 4,
                    i11 = (y1 * w + x1) * 4;
                const idx = (py * w + px) * 4;
                for (let ch = 0; ch < 3; ch++) {
                    dst[idx + ch] = Math.round(
                        src[i00 + ch] * (1 - ftx) * (1 - fty) +
                            src[i10 + ch] * ftx * (1 - fty) +
                            src[i01 + ch] * (1 - ftx) * fty +
                            src[i11 + ch] * ftx * fty,
                    );
                }
                dst[idx + 3] = 255;
            }
        }
    }

    function frame() {
        const mx = Math.round(mouse.x),
            my = Math.round(mouse.y);
        if (
            mode === lastMode &&
            radius === lastRad &&
            mag === lastMag &&
            mx === lastMx &&
            my === lastMy
        ) {
            animId = requestAnimationFrame(frame);
            return;
        }
        lastMode = mode;
        lastRad = radius;
        lastMag = mag;
        lastMx = mx;
        lastMy = my;

        ctx.drawImage(offscreen, 0, 0);
        const imgData = ctx.getImageData(0, 0, W, H);
        applyLens(imgData, mx, my, radius, mag, mode);
        ctx.putImageData(imgData, 0, 0);

        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(mx, my, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(8, 8, 200, 22);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = "12px monospace";
        ctx.fillText(
            mode === "l1"
                ? "L¹ diagonal warp"
                : mode === "snell"
                  ? "Snell hemisphere"
                  : "Flat zoom",
            14,
            23,
        );
        ctx.restore();

        animId = requestAnimationFrame(frame);
    }
    animId = requestAnimationFrame(frame);
</script>
